name: Deploy to Windows VPS (IIS)

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish src/SquadPortfolio/SquadPortfolio.csproj -c Release -o ./publish

      - name: Transfer files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "./publish/wwwroot/*"
          target: "C:/inetpub/wwwroot/portfolio"
          strip_components: 2

      - name: Configure IIS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            powershell -Command "
              Import-Module WebAdministration

              # Pointer le Default Web Site vers le portfolio
              Set-ItemProperty 'IIS:\Sites\Default Web Site' -Name physicalPath -Value 'C:\inetpub\wwwroot\portfolio'
              Write-Host 'Physical path mis a jour'

              # S assurer que le site tourne
              Start-Website -Name 'Default Web Site'
              Write-Host 'Deploiement termine'
            "
